<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Niezawodność i diagnostyka — test 150 pytań</title>
<style>
:root{--bg1:#0f172a;--bg2:#111827;--card:#fff;--text:#111827;--muted:#6b7280;--accent:#2563eb;--good:#16a34a;--bad:#dc2626;--border:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
.app{width:min(960px,100%);background:var(--card);border-radius:22px;box-shadow:0 24px 80px rgba(0,0,0,.35);overflow:hidden}
.header{padding:22px 26px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;gap:16px;justify-content:space-between;align-items:center;flex-wrap:wrap}
h1{font-size:22px;margin:0 0 6px}
.sub{color:var(--muted);font-size:14px;line-height:1.4}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.pill{background:#e0ecff;color:#1d4ed8;border-radius:999px;padding:8px 12px;font-weight:700;font-size:14px}
.content{padding:26px}
.progressbar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:22px}
.progress{height:100%;width:0%;background:var(--accent);transition:.25s}
.question{font-size:24px;line-height:1.32;font-weight:800;margin:0 0 22px}
.answers{display:grid;gap:12px}
.answer{border:2px solid var(--border);border-radius:15px;padding:16px;font-size:18px;cursor:pointer;transition:.15s;background:white;line-height:1.35}
.answer:hover{border-color:#93c5fd;background:#f8fbff}
.answer.selected{border-color:var(--accent);background:#eff6ff}
.answer.correct{border-color:var(--good);background:#ecfdf5}
.answer.wrong{border-color:var(--bad);background:#fef2f2}
.feedback{margin-top:18px;padding:15px 16px;border-radius:14px;display:none;font-size:17px;font-weight:700}
.feedback.good{display:block;background:#ecfdf5;color:#166534}
.feedback.bad{display:block;background:#fef2f2;color:#991b1b}
.controls{display:flex;gap:12px;justify-content:space-between;margin-top:24px;flex-wrap:wrap}
button{border:none;border-radius:13px;padding:14px 18px;font-size:16px;font-weight:800;cursor:pointer}
.primary{background:var(--accent);color:white}
.secondary{background:#e5e7eb;color:#111827}
button:disabled{opacity:.45;cursor:not-allowed}
.result{display:none;text-align:center;padding:34px 20px}
.result h2{font-size:32px;margin:0 0 10px}
.result p{font-size:19px;color:var(--muted)}
.review{margin-top:24px;text-align:left}
.review-item{border-top:1px solid var(--border);padding:14px 0;line-height:1.4}
.small{font-size:13px;color:var(--muted);margin-top:8px}
.selectBox{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
select{padding:9px 12px;border-radius:10px;border:1px solid var(--border);font-weight:700}
@media(max-width:600px){.question{font-size:20px}.answer{font-size:16px}.content{padding:20px}}
</style>
</head>
<body>
<div class="app">
<div class="header">
<div>
<h1>Niezawodność i diagnostyka — test</h1>
<div class="sub">150 pytań. Losowa kolejność pytań i odpowiedzi. Możesz robić pełny test albo krótszą serię.</div>
<div class="selectBox">
<label for="limitSelect">Liczba pytań:</label>
<select id="limitSelect">
<option value="150">150</option>
<option value="100">100</option>
<option value="50">50</option>
<option value="30">30</option>
<option value="20">20</option>
</select>
</div>
</div>
<div class="stats"><div class="pill" id="counter">1/150</div><div class="pill" id="score">Wynik:0</div></div>
</div>
<div class="content" id="quiz">
<div class="progressbar"><div class="progress" id="progress"></div></div>
<div class="question" id="question"></div>
<div class="answers" id="answers"></div>
<div class="feedback" id="feedback"></div>
<div class="controls">
<button class="secondary" id="restartBtn">Losuj od nowa</button>
<div><button class="secondary" id="checkBtn">Sprawdź</button><button class="primary" id="nextBtn" disabled>Następne→</button></div>
</div>
<div class="small">Skróty: A/B/C/D albo 1/2/3/4 zaznacza odpowiedź. Enter sprawdza albo przechodzi dalej.</div>
</div>
<div class="result" id="result">
<h2 id="finalTitle"></h2>
<p id="finalScore"></p>
<button class="primary" id="againBtn">Zacznij jeszcze raz</button>
<div class="review" id="review"></div>
</div>
</div>

let questions=[],current=0,selected=null,checked=false,score=0,history=[];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function prepareQuestions(){const limit=Number(document.getElementById('limitSelect').value);questions=shuffle(baseQuestions).slice(0,limit).map(item=>{const options=item.a.map((text,idx)=>({text,correct:idx===item.c}));return{q:item.q,options:shuffle(options)}})}
function render(){selected=null;checked=false;document.getElementById('feedback').className='feedback';document.getElementById('feedback').textContent='';document.getElementById('nextBtn').disabled=true;document.getElementById('checkBtn').disabled=false;const q=questions[current];document.getElementById('question').textContent=q.q;document.getElementById('counter').textContent=(current+1)+'/'+questions.length;document.getElementById('score').textContent='Wynik:'+score;document.getElementById('progress').style.width=(current/questions.length*100)+'%';const answers=document.getElementById('answers');answers.innerHTML='';q.options.forEach((opt,idx)=>{const div=document.createElement('div');div.className='answer';div.textContent=String.fromCharCode(65+idx)+'. '+opt.text;div.onclick=()=>{if(checked)return;selected=idx;document.querySelectorAll('.answer').forEach(el=>el.classList.remove('selected'));div.classList.add('selected')};answers.appendChild(div)})}
function check(){if(selected===null||checked)return;checked=true;const q=questions[current];const opts=document.querySelectorAll('.answer');const fb=document.getElementById('feedback');const isCorrect=q.options[selected].correct;opts.forEach((el,idx)=>{if(q.options[idx].correct)el.classList.add('correct');if(idx===selected&&!q.options[idx].correct)el.classList.add('wrong')});if(isCorrect){score++;fb.className='feedback good';fb.textContent='Dobrze.'}else{const correctText=q.options.find(o=>o.correct).text;fb.className='feedback bad';fb.textContent='Źle. Poprawna odpowiedź: '+correctText}history.push({question:q.q,selected:q.options[selected].text,correct:q.options.find(o=>o.correct).text,ok:isCorrect});document.getElementById('score').textContent='Wynik:'+score;document.getElementById('nextBtn').disabled=false;document.getElementById('checkBtn').disabled=true}
function next(){if(!checked)return;if(current<questions.length-1){current++;render()}else finish()}
function finish(){document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';const percent=Math.round(score/questions.length*100);document.getElementById('finalTitle').textContent=percent>=80?'Dobry wynik':percent>=60?'Średnio — powtórz słabe działy':'Słabo — wróć do ściągi';document.getElementById('finalScore').textContent='Twój wynik: '+score+'/'+questions.length+' ('+percent+'%)';const review=document.getElementById('review');review.innerHTML='<h3>Podsumowanie błędów</h3>';const wrong=history.filter(h=>!h.ok);if(!wrong.length)review.innerHTML+='<p>Bez błędów.</p>';else wrong.forEach((h,i)=>{review.innerHTML+='<div class="review-item"><b>'+(i+1)+'. '+h.question+'</b><br>Twoja odpowiedź: '+h.selected+'<br>Poprawna: '+h.correct+'</div>'})}
function start(){prepareQuestions();current=0;selected=null;checked=false;score=0;history=[];document.getElementById('quiz').style.display='block';document.getElementById('result').style.display='none';render()}
document.getElementById('checkBtn').onclick=check;document.getElementById('nextBtn').onclick=next;document.getElementById('restartBtn').onclick=start;document.getElementById('againBtn').onclick=start;document.getElementById('limitSelect').onchange=start;
